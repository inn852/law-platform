<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>교사용 | 치동고등학교 법과사회 사례 탐구 플랫폼</title><style>:root{--main:#1e3a8a;--bg:#f5f7fb;--ink:#172033;--line:#e5e7eb}*{box-sizing:border-box}body{font-family:Arial,'Malgun Gothic',sans-serif;margin:0;background:var(--bg);color:var(--ink);line-height:1.65}header{background:linear-gradient(135deg,#172033,#1e3a8a);color:white;padding:30px 16px;text-align:center}main{max-width:1180px;margin:18px auto;padding:0 12px}section{background:white;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.045)}h1{margin:0;font-size:clamp(24px,5vw,32px)}h2{margin-top:0;font-size:clamp(20px,4vw,26px)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.card{border:1px solid #d1d5db;border-radius:15px;background:#fafafa;padding:16px;cursor:pointer;transition:.15s}.card:hover{border-color:var(--main);transform:translateY(-2px);background:#f8fafc}.badge{display:inline-block;background:#111827;color:#fff;border-radius:999px;padding:3px 10px;font-size:12px;margin-right:4px}.caseNo{display:inline-block;background:#f97316;color:white;border-radius:999px;padding:3px 10px;font-size:12px;margin-right:4px}.tag{display:inline-block;background:#dbeafe;color:#1e40af;border-radius:999px;padding:3px 9px;font-size:12px;margin:2px}button{border:0;border-radius:12px;background:#2563eb;color:white;padding:11px 15px;cursor:pointer;margin:6px 4px 0 0;font-size:15px}button.secondary{background:#475569}input,select{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:11px;font-size:15px}.controls{display:grid;grid-template-columns:1fr 220px;gap:10px}.hidden{display:none}.facts{background:#f8fafc;border-left:5px solid #2563eb;padding:14px;border-radius:8px}.fact-line{padding:8px;border-radius:8px;margin:4px 0;cursor:pointer}.fact-line:hover{background:#eef2ff}.fact-line.marked{background:#fef08a}.help{background:#fff7ed;border-left:5px solid #f97316;padding:14px;border-radius:8px}.concept{background:#f0f9ff;border-left:5px solid #0284c7;padding:14px;border-radius:8px}.notice{background:#eef2ff;border-left:5px solid #4f46e5;padding:13px;border-radius:8px}.small{font-size:13px;color:#64748b}.progress{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.step{padding:5px 10px;border-radius:999px;background:#e5e7eb;font-size:13px}.step.on{background:#2563eb;color:white}.two{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr);gap:16px}.rubric{margin-top:14px;background:#f8fafc;border:1px solid #cbd5e1;border-radius:12px;padding:12px}.rubric table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}.rubric th,.rubric td{border:1px solid #cbd5e1;padding:8px;vertical-align:top}.formWrap{margin-top:16px;border:1px solid #cbd5e1;border-radius:14px;overflow:hidden;background:#fff}.formWrap iframe{width:100%;height:820px;border:0;display:block}.copyBox{background:#f8fafc;border:1px dashed #94a3b8;border-radius:10px;padding:10px;margin:10px 0;white-space:pre-wrap}.aiBox{position:fixed;right:18px;bottom:18px;width:310px;max-width:calc(100vw - 36px);background:white;border:1px solid #cbd5e1;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.18);overflow:hidden;z-index:99}.aiHead{background:#172033;color:white;padding:10px 12px;font-weight:bold;display:flex;justify-content:space-between;align-items:center}.aiBody{padding:10px;max-height:260px;overflow:auto;font-size:13px}.aiMsg{padding:8px 10px;border-radius:10px;margin:6px 0;background:#f1f5f9}.aiMsg.me{background:#dbeafe;text-align:right}.aiInput{display:flex;gap:6px;padding:10px;border-top:1px solid #e5e7eb}.aiInput input{font-size:13px;padding:8px}.aiInput button{padding:8px 10px;margin:0;font-size:13px}footer{text-align:center;color:#64748b;padding:24px}@media(max-width:800px){main{padding:0 10px;margin:12px auto}section{padding:16px}.two,.controls{grid-template-columns:1fr}.formWrap iframe{height:900px}.aiBox{position:static;width:auto;max-width:none;margin:12px 10px}}.teacherOnly{background:#f0fdf4;border-left:5px solid #16a34a;padding:14px;border-radius:10px;margin-top:10px}</style></head><body><header><h1>⚖️ 교사용 해설 | 치동고등학교 법과사회 사례 탐구 플랫폼</h1><p>학생에게 공유하지 않는 교사용 페이지</p></header><main><section><h2>교사용 안내</h2><p>학생용 페이지에는 법률 해설이 보이지 않습니다. 이 페이지에서 사례별 해설과 채점 포인트를 확인하세요.</p></section><section id="stepCards"><h2>사례별 해설</h2><div class="controls"><input id="q" oninput="renderCards()" placeholder="검색어"><select id="areaFilter" onchange="renderCards()"><option value="">전체 영역</option><option value="가족생활과 법">가족생활과 법</option><option value="계약과 불법 행위">계약과 불법 행위</option><option value="재산 관계와 법">재산 관계와 법</option></select></div><br><div id="cards" class="grid"></div></section><section id="detail" class="hidden"><h2 id="caseTitle"></h2><p id="caseMeta" class="small"></p><div id="caseTags"></div><h3>사건 내용</h3><div id="caseFacts" class="facts"></div><h3>학생용 분석 도움말</h3><div id="caseGuide" class="help"></div><h3>교과 개념</h3><div id="caseConcepts" class="concept"></div><h3>법률 해설</h3><div id="caseExplain" class="teacherOnly"></div><h3>채점 포인트</h3><div id="caseTeacher" class="teacherOnly"></div></section></main><footer>교사용 페이지</footer><script>
const cases=[{"no": "01", "unit": "1단원 가족생활과 법", "area": "가족생활과 법", "title": "부모님 몰래 혼인신고를 한 경우", "tags": ["혼인", "성년", "법률관계"], "facts": ["스무 살이 된 나라의 오빠는 오래 사귄 연인과 혼인신고를 하려고 하였다.", "부모님은 아직 경제적으로 독립하지 못했다며 강하게 반대하였다.", "오빠는 부모님께 알리지 않고 연인과 혼인신고를 하였다.", "부모님은 부모 허락 없이 한 혼인은 무효라고 주장하였다.", "오빠는 성년이므로 자신의 의사로 혼인할 수 있다고 주장하였다."], "guide": ["등장인물은 누구인가요?", "각 인물은 무엇을 주장하고 있나요?", "이 사건에서 해결해야 할 법적 문제는 무엇인가요?"], "concepts": [["혼인", "두 사람이 법률상 부부가 되는 신분 행위입니다."], ["성년", "법적으로 독립된 의사결정을 할 수 있는 나이에 이른 사람입니다."], ["법률관계", "법에 따라 권리와 의무가 발생하는 생활 관계입니다."]], "explain": "성년자는 원칙적으로 자신의 의사에 따라 혼인할 수 있다. 혼인은 단순한 약속이 아니라 부부 사이의 권리와 의무를 발생시키는 법률관계이다. 부모의 경제적 걱정은 현실적으로 중요할 수 있지만, 성년자의 혼인 자체를 당연히 무효로 만드는 사유는 아니다.", "teacher": "핵심 쟁점은 성년자의 혼인에 부모 동의가 필요한가이다."}, {"no": "02", "unit": "1단원 가족생활과 법", "area": "가족생활과 법", "title": "이혼 후 자녀를 누가 돌볼까?", "tags": ["이혼", "친권", "양육", "자녀의 복리"], "facts": ["A와 B는 이혼하기로 하였고, 중학생 자녀 C가 있다.", "A는 자신의 집이 학교와 가까우므로 C가 자신과 함께 살아야 한다고 주장하였다.", "B는 자신이 평소 C를 더 많이 돌보았으므로 양육자가 되어야 한다고 주장하였다.", "C는 현재 학교와 친구 관계를 계속 유지하고 싶다고 말하였다.", "두 사람은 친권과 양육 문제를 두고 다투고 있다."], "guide": ["부모의 주장만 보면 충분할까요?", "자녀 C의 생활과 의사는 어떻게 고려해야 할까요?", "누구의 이익을 가장 우선해야 할까요?"], "concepts": [["친권", "부모가 미성년 자녀를 보호하고 교육할 권리와 의무입니다."], ["양육", "자녀를 실제로 보호하고 기르는 일입니다."], ["자녀의 복리", "자녀에게 가장 이로운 상태를 뜻합니다."]], "explain": "친권자와 양육자를 정할 때에는 부모의 편의나 주장보다 자녀의 복리를 우선적으로 고려해야 한다.", "teacher": "자녀의 복리 개념이 근거로 제시되면 좋다."}, {"no": "03", "unit": "1단원 가족생활과 법", "area": "가족생활과 법", "title": "손글씨 유언장에 주소가 빠진 경우", "tags": ["유언", "상속", "자필증서"], "facts": ["할아버지는 돌아가시기 전 손글씨로 유언장을 작성하였다.", "유언장에는 재산을 어떻게 나눌지, 작성 날짜, 이름, 도장이 있었다.", "하지만 주소는 적혀 있지 않았다.", "큰아버지는 할아버지의 뜻이 분명하니 유언장을 인정해야 한다고 주장하였다.", "다른 가족은 법에서 정한 형식이 빠졌으니 효력을 인정하기 어렵다고 주장하였다."], "guide": ["유언자의 뜻이 분명하면 충분할까요?", "유언에서 형식이 중요한 이유는 무엇일까요?", "상속인 사이의 분쟁을 줄이기 위해 필요한 기준은 무엇일까요?"], "concepts": [["유언", "사망 후 재산 처리 등에 관한 의사표시입니다."], ["상속", "사망한 사람의 재산상 권리와 의무가 일정한 사람에게 이어지는 것입니다."], ["자필증서 유언", "유언자가 직접 손으로 쓰는 방식의 유언입니다."]], "explain": "유언은 사망 후 효력이 문제되므로 분쟁을 막기 위해 법에서 정한 형식이 중요하다.", "teacher": "법정 형식의 중요성을 도출하는지 평가한다."}, {"no": "04", "unit": "1단원 가족생활과 법", "area": "가족생활과 법", "title": "부모님의 빚도 상속해야 할까?", "tags": ["상속", "상속포기", "한정승인"], "facts": ["A의 아버지가 돌아가신 뒤 A는 아버지에게 재산보다 빚이 더 많다는 사실을 알게 되었다.", "채권자들은 A에게 아버지의 빚을 갚으라고 요구하였다.", "A는 자신이 만든 빚도 아닌데 모두 갚아야 하는지 걱정하였다.", "A는 상속을 포기하거나 책임을 제한할 수 있는 방법이 있는지 알아보려고 한다."], "guide": ["상속은 재산만 물려받는 것일까요?", "빚까지 모두 책임지는 것이 항상 타당할까요?", "상속인을 보호하기 위한 제도에는 무엇이 있을까요?"], "concepts": [["상속", "사망한 사람의 재산상 권리와 의무가 이어지는 것입니다."], ["상속포기", "상속인의 지위를 포기하는 제도입니다."], ["한정승인", "상속받은 재산의 한도에서 빚을 책임지는 제도입니다."]], "explain": "상속은 재산뿐 아니라 채무도 함께 승계될 수 있다. 그러나 상속포기와 한정승인 제도가 마련되어 있다.", "teacher": "상속채무와 상속포기·한정승인을 연결하는지 본다."}, {"no": "05", "unit": "2단원 계약과 불법 행위", "area": "계약과 불법 행위", "title": "오빠에게 빌려준 돈, 차용증이 꼭 필요할까?", "tags": ["계약", "채권", "채무", "차용증"], "facts": ["나라는 아르바이트해서 모은 돈 중 30만 원을 오빠에게 빌려주었다.", "오빠는 다음 달 월급을 받으면 갚겠다고 말했지만 따로 문서를 작성하지 않았다.", "한 달 뒤 오빠는 조금만 더 기다려 달라며 돈을 갚지 않았다.", "나라는 돈을 빌려준 사실과 갚기로 한 약속을 어떻게 증명할 수 있을지 고민한다."], "guide": ["돈을 빌려주는 것도 계약일까요?", "돈을 빌려준 사람과 빌린 사람은 각각 어떤 권리와 의무를 가질까요?", "차용증은 어떤 역할을 할까요?"], "concepts": [["계약", "사람 사이의 합의나 약속으로 권리와 의무를 발생시키는 법률행위입니다."], ["채권", "특정한 사람에게 일정한 행위를 요구할 수 있는 권리입니다."], ["채무", "특정한 사람에게 일정한 행위를 해야 할 의무입니다."], ["차용증", "돈을 빌린 사실과 갚기로 한 약속을 증명하는 문서입니다."]], "explain": "돈을 빌려주고 갚기로 하는 약속도 계약으로 볼 수 있다. 차용증은 분쟁이 생겼을 때 계약 내용을 증명하는 자료가 된다.", "teacher": "계약 성립, 채권·채무, 증거 기능을 평가한다."}, {"no": "06", "unit": "2단원 계약과 불법 행위", "area": "계약과 불법 행위", "title": "미성년자가 부모 몰래 노트북을 산 경우", "tags": ["미성년자", "계약", "법정대리인"], "facts": ["고등학생 A는 부모님께 말하지 않고 중고거래 앱에서 150만 원짜리 노트북을 구매하였다.", "판매자 B는 A와 대화를 나눈 뒤 물건을 전달했고 돈도 받았다.", "A의 부모님은 뒤늦게 이 사실을 알고 계약을 취소하고 돈을 돌려달라고 요구하였다.", "B는 A가 직접 거래했고 이미 물건을 넘겼으니 계약은 끝났다고 주장하였다."], "guide": ["미성년자가 혼자 한 계약은 항상 유효할까요?", "부모의 동의는 왜 중요할까요?", "미성년자 보호와 거래 상대방 보호를 어떻게 조화할 수 있을까요?"], "concepts": [["미성년자", "법적으로 아직 성년에 이르지 않은 사람입니다."], ["법정대리인", "미성년자를 대신하거나 동의할 수 있는 사람으로 보통 부모가 해당합니다."], ["계약 취소", "일정한 사유가 있을 때 이미 한 계약의 효력을 없애는 것입니다."]], "explain": "미성년자가 법정대리인의 동의 없이 한 법률행위는 취소할 수 있는 경우가 있다. 이는 미성년자를 보호하기 위한 제도이다.", "teacher": "부모 동의 없는 미성년자의 고가 계약 취소 가능성을 다룬다."}, {"no": "07", "unit": "2단원 계약과 불법 행위", "area": "계약과 불법 행위", "title": "중고거래 휴대폰이 설명과 다른 경우", "tags": ["계약", "하자", "계약 해제", "손해배상"], "facts": ["A는 중고거래 앱에서 ‘상태 좋음, 정상 작동’이라고 적힌 휴대폰을 구매하였다.", "물건을 받은 뒤 확인하니 배터리가 급격히 닳고 화면 터치도 자주 먹통이 되었다.", "A는 판매자 B에게 환불을 요구하였다.", "B는 중고 물건이므로 어느 정도 문제는 감수해야 한다고 주장하였다."], "guide": ["판매자가 올린 설명은 계약에서 어떤 의미가 있을까요?", "물건 상태가 설명과 다르면 구매자는 무엇을 요구할 수 있을까요?", "중고 물건이라는 사정은 판단에 어떤 영향을 줄까요?"], "concepts": [["하자", "물건에 약속된 품질이나 성능이 부족한 상태입니다."], ["계약 해제", "계약의 효력을 소멸시켜 처음부터 없었던 것처럼 처리하는 것입니다."], ["손해배상", "발생한 손해를 금전 등으로 보상하는 것입니다."]], "explain": "계약이 성립하면 판매자는 약속한 상태의 물건을 넘겨야 한다. 중요한 설명과 다른 물건을 넘겼다면 계약 해제나 손해배상 문제가 생길 수 있다.", "teacher": "계약 내용과 다른 물건을 받은 경우 해결을 묻는다."}, {"no": "08", "unit": "2단원 계약과 불법 행위", "area": "계약과 불법 행위", "title": "친구 태블릿을 떨어뜨린 경우", "tags": ["불법행위", "과실", "손해배상"], "facts": ["A는 쉬는 시간에 친구 B의 태블릿을 빌려 영상을 보았다.", "A가 태블릿을 책상 끝에 올려두었다가 실수로 떨어뜨려 액정이 깨졌다.", "B는 수리비를 A가 부담해야 한다고 주장하였다.", "A는 일부러 그런 것이 아니므로 전부 책임질 수는 없다고 주장하였다."], "guide": ["A의 행동으로 B에게 어떤 손해가 발생했나요?", "고의가 아니어도 책임이 발생할 수 있을까요?", "손해배상 책임을 판단할 때 무엇을 확인해야 할까요?"], "concepts": [["불법행위", "고의나 과실로 타인에게 손해를 입히는 행위입니다."], ["과실", "주의해야 할 의무를 다하지 못한 잘못입니다."], ["손해배상", "손해를 보상하는 책임입니다."]], "explain": "고의가 없더라도 과실로 타인에게 손해를 입히면 불법행위에 따른 손해배상 책임이 문제될 수 있다.", "teacher": "불법행위와 손해배상의 기본 구조를 평가한다."}, {"no": "09", "unit": "3단원 재산 관계와 법", "area": "재산 관계와 법", "title": "사물함 보조배터리는 누구의 물건일까?", "tags": ["동산", "점유", "소유권"], "facts": ["A는 자신의 보조배터리를 학교 사물함에 넣어 두었다.", "며칠 뒤 보조배터리가 사라졌고, 같은 반 B가 비슷한 보조배터리를 사용하고 있었다.", "B는 자신이 집에서 가져온 물건이라고 주장하였다.", "A는 원래 자신의 물건이므로 돌려받아야 한다고 주장하였다."], "guide": ["물건을 가지고 있는 사람과 소유자는 항상 같을까요?", "A는 자신의 소유권을 어떻게 주장할 수 있을까요?", "증거가 부족하면 어떤 문제가 생길까요?"], "concepts": [["동산", "부동산을 제외한 물건입니다."], ["점유", "물건을 사실상 지배하고 있는 상태입니다."], ["소유권", "물건을 사용·수익·처분할 수 있는 권리입니다."]], "explain": "동산의 경우 실제로 누가 가지고 있는지와 누가 소유자인지가 문제될 수 있다.", "teacher": "점유와 소유권을 구분하는지 평가한다."}, {"no": "10", "unit": "3단원 재산 관계와 법", "area": "재산 관계와 법", "title": "전세집 계약 전 등기부를 확인해야 할까?", "tags": ["부동산", "등기", "전세", "권리관계"], "facts": ["대학생이 될 예정인 A는 학교 근처 원룸 전세 계약을 하려고 한다.", "공인중개사는 집이 깨끗하고 위치가 좋다며 계약을 권하였다.", "A의 부모님은 계약 전에 등기 사항 전부 증명서를 확인해야 한다고 말하였다.", "A는 집주인이 누구인지, 집에 빚이 있는지 왜 확인해야 하는지 잘 모르겠다."], "guide": ["부동산은 왜 권리관계를 확인하기 어려울까요?", "등기부는 어떤 정보를 알려 줄까요?", "전세 계약 전에 등기부를 확인하지 않으면 어떤 문제가 생길까요?"], "concepts": [["부동산", "토지와 건물처럼 움직여 옮길 수 없는 물건입니다."], ["등기 제도", "부동산에 관한 권리관계를 공적으로 기록하는 제도입니다."], ["등기 사항 전부 증명서", "부동산의 소유자와 권리관계를 확인할 수 있는 문서입니다."]], "explain": "부동산은 겉으로 권리관계를 알기 어렵기 때문에 등기 제도를 통해 소유자와 권리관계를 확인한다.", "teacher": "부동산 거래와 등기 제도 학습 목표와 직접 연결된다."}, {"no": "11", "unit": "3단원 재산 관계와 법", "area": "재산 관계와 법", "title": "전입 신고와 확정일자를 왜 받아야 할까?", "tags": ["주택 임대차", "대항력", "확정일자", "우선변제권"], "facts": ["A는 보증금 5천만 원을 내고 원룸에 입주하였다.", "친구는 전입 신고를 하고 임대차 계약서에 확정일자를 받아 두라고 조언하였다.", "A는 이미 계약서를 썼고 실제로 살고 있으니 충분하다고 생각하였다.", "나중에 집주인의 사정으로 집이 경매에 넘어갈 수도 있다는 말을 듣고 걱정이 되었다."], "guide": ["전입 신고는 임차인에게 어떤 의미가 있을까요?", "확정일자를 받으면 어떤 점에서 도움이 될까요?", "임차인의 보증금을 보호하기 위해 어떤 제도가 필요할까요?"], "concepts": [["주택 임대차", "주택을 빌려 쓰는 계약 관계입니다."], ["대항력", "임차인이 자신의 임차권을 제3자에게 주장할 수 있는 힘입니다."], ["확정일자", "임대차 계약서가 특정 날짜에 존재했다는 것을 공적으로 확인받는 것입니다."], ["우선변제권", "일정 요건에서 보증금을 다른 채권자보다 먼저 돌려받을 수 있는 권리입니다."]], "explain": "주택 임차인은 주택 인도와 전입 신고 등을 통해 대항력을 갖출 수 있고, 확정일자를 받으면 우선변제권과 관련된다.", "teacher": "주택 임대차 보호와 대항력·우선변제권 이해를 평가한다."}, {"no": "12", "unit": "3단원 재산 관계와 법", "area": "재산 관계와 법", "title": "빌린 자전거를 다른 친구에게 다시 빌려줘도 될까?", "tags": ["동산", "소유권", "사용 권한"], "facts": ["A는 친구 B에게 자전거를 하루만 빌렸다.", "A는 자전거를 타다가 다른 친구 C가 잠깐만 타고 싶다고 하자 C에게 다시 빌려주었다.", "C가 타던 중 자전거 일부가 고장났다.", "B는 A에게 허락 없이 다른 사람에게 빌려준 책임을 묻고 있다."], "guide": ["A는 자전거의 소유자인가요, 단순히 빌려 쓴 사람인가요?", "빌린 물건을 다시 다른 사람에게 빌려주는 것은 허용될까요?", "자전거 고장에 대해 누가 책임져야 할까요?"], "concepts": [["동산", "부동산을 제외한 물건입니다."], ["소유권", "물건을 사용·수익·처분할 수 있는 권리입니다."], ["사용 권한", "소유자가 아니더라도 일정한 범위에서 물건을 사용할 수 있는 권한입니다."]], "explain": "물건을 빌린 사람은 소유자가 아니므로 약속한 범위 안에서 사용해야 한다. 허락 없이 다른 사람에게 다시 빌려주었다가 손해가 발생하면 책임 문제가 생길 수 있다.", "teacher": "동산에 관한 권리, 소유권과 사용 권한 구분을 평가하기 좋다."}];let selected=null;
function renderCards(){const q=(document.getElementById('q')?.value||'').toLowerCase().trim();const area=document.getElementById('areaFilter')?.value||'';const filtered=cases.filter(c=>{const text=(c.no+' '+c.area+' '+c.title+' '+c.tags.join(' ')+' '+c.facts.join(' ')+' '+(c.explain||'')).toLowerCase();return(!area||c.area===area)&&(!q||text.includes(q));});document.getElementById('cards').innerHTML=filtered.map(c=>{const i=cases.indexOf(c);const tags=c.tags.map(k=>`<span class="tag">${k}</span>`).join('');return `<div class="card" onclick="selectCase(${i})"><span class="caseNo">${c.no}</span><span class="badge">${c.area}</span><h3>${c.title}</h3><p class="small">${c.unit}</p><div>${tags}</div></div>`;}).join('')||'<p>검색 결과가 없습니다.</p>';}
function selectCase(i){selected=cases[i];document.getElementById('caseTitle').textContent=`사례 ${selected.no}. ${selected.title}`;document.getElementById('caseMeta').textContent=selected.unit;document.getElementById('caseTags').innerHTML=selected.tags.map(k=>`<span class="tag">${k}</span>`).join('');document.getElementById('caseFacts').innerHTML=selected.facts.map((f,idx)=>`<div class="fact-line" onclick="this.classList.toggle('marked')">${idx+1}. ${f}</div>`).join('');document.getElementById('caseGuide').innerHTML='<ul>'+selected.guide.map(t=>`<li>${t}</li>`).join('')+'</ul>';document.getElementById('caseConcepts').innerHTML='<ul>'+selected.concepts.map(c=>`<li><b>${c[0]}</b>: ${c[1]}</li>`).join('')+'</ul>';document.getElementById('caseCopyInfo')&&(document.getElementById('caseCopyInfo').textContent=`사례 번호: ${selected.no}`);if(document.getElementById('caseExplain'))document.getElementById('caseExplain').textContent=selected.explain;if(document.getElementById('caseTeacher'))document.getElementById('caseTeacher').textContent=selected.teacher;document.getElementById('stepCards')?.classList.add('hidden');document.getElementById('stepFacts')?.classList.remove('hidden');document.getElementById('detail')?.classList.remove('hidden');(document.getElementById('stepFacts')||document.getElementById('detail')).scrollIntoView({behavior:'smooth'});}
function goCards(){document.getElementById('stepFacts').classList.add('hidden');document.getElementById('stepCards').classList.remove('hidden');window.scrollTo(0,0);}
function copyCaseNo(){if(!selected)return;navigator.clipboard.writeText(selected.no).then(()=>alert(`사례 번호 ${selected.no}가 복사되었습니다.`));}

renderCards();
</script></body></html>
